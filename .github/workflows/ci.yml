name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      front: ${{ steps.filter.outputs.front }}
      pdf_renderer: ${{ steps.filter.outputs.pdf_renderer }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            front:
              - 'front/**'
            pdf_renderer:
              - 'pdf-renderer/**'

  backend:
    name: Backend (Worker)
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Typecheck
        working-directory: backend
        run: npm run check

      - name: Test
        working-directory: backend
        run: npm test

  front:
    name: Frontend (Next.js)
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.front == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Lint
        working-directory: front
        run: npm run lint

      - name: Build
        working-directory: front
        run: npm run build

  pdf-renderer:
    name: PDF Renderer
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.pdf_renderer == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            pdf-renderer/package-lock.json

      - name: Install dependencies
        working-directory: pdf-renderer
        run: npm ci

      - name: Syntax check
        working-directory: pdf-renderer
        run: node --check src/server.js
