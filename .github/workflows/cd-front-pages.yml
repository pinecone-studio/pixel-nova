name: CD Front Pages

on:
  push:
    branches: [main]
    paths:
      - "front/**"
      - ".github/workflows/cd-front-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-front-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  deploy-front:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Lint
        working-directory: front
        run: npm run lint

      - name: Build static site
        working-directory: front
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: npm run build:pages

      - name: Validate Pages config
        env:
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          if [ -z "$PROJECT_NAME" ]; then
            echo "Missing GitHub variable: CLOUDFLARE_PAGES_PROJECT_NAME"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: front
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: npx wrangler@4 pages deploy out --project-name "$PROJECT_NAME"
